version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: line-like-db
    environment:
      POSTGRES_DB: chat_app
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d

  backend:
    build:
      context: ./backend
    container_name: line-like-backend
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://chat:chat@db:5432/chat_app
    depends_on:
      - db
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
    container_name: line-like-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
